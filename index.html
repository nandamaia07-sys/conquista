<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Conquista</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:#e8edf5;min-height:100vh;font-size:16px}
#app{width:100%;max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
button,input,select{font-family:inherit;cursor:pointer}
.apt-header{position:relative;height:clamp(155px,42vw,215px);overflow:hidden}
.apt-header img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block}
.apt-overlay{position:absolute;inset:0;background:linear-gradient(170deg,rgba(8,18,40,.82) 0%,rgba(12,28,65,.68) 55%,rgba(15,35,71,.48) 100%)}
.apt-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(12px,4vw,18px) clamp(14px,4vw,20px) clamp(22px,6vw,30px)}
.app-badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 12px;font-size:clamp(10px,2.5vw,12px);color:#fff;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.apt-title{font-size:clamp(18px,5.5vw,26px);font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6);margin-bottom:3px}
.apt-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,.85)}
.btn-edit-apt{position:absolute;top:clamp(10px,3vw,16px);right:clamp(10px,3vw,16px);background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 13px;color:#fff;font-size:clamp(12px,3vw,14px);font-weight:700}
.content{padding:0 clamp(10px,3.5vw,14px);margin-top:-16px;padding-bottom:24px}
.prog-card{background:#fff;border-radius:16px;padding:clamp(14px,4vw,20px);box-shadow:0 4px 18px rgba(10,22,40,.12);border:2px solid #0f2347;margin-bottom:13px}
.prog-label{font-weight:800;font-size:clamp(14px,3.8vw,17px);color:#000;margin-bottom:3px}
.prog-sub{color:#000;font-size:clamp(12px,3.2vw,15px);font-weight:500;margin-bottom:12px}
.prog-bar-bg{background:#d8dfe8;border-radius:99px;height:clamp(10px,2.5vw,13px);overflow:hidden;margin-bottom:8px}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,#0f2347,#2563eb);border-radius:99px;transition:width .6s}
.prog-pct{display:flex;justify-content:space-between;font-size:clamp(12px,3.2vw,15px)}
.prog-pct span:first-child{color:#000;font-weight:600}
.prog-pct span:last-child{color:#0f2347;font-weight:800}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2.5vw,12px);margin-bottom:13px}
.stat-card{border-radius:13px;padding:clamp(10px,3vw,14px) clamp(10px,3vw,13px);position:relative;min-height:clamp(78px,20vw,90px);border:2px solid #0f2347;background:#fff;box-shadow:0 2px 10px rgba(10,22,40,.08)}
.stat-label{font-size:clamp(11px,2.8vw,13px);color:#000;font-weight:700;margin-bottom:4px}
.stat-value{font-weight:800;line-height:1.25;word-break:break-word;padding-right:4px}
.stat-sub{font-size:clamp(10px,2.4vw,12px);color:#444;font-weight:600;margin-top:4px}
.btn-panel{width:100%;padding:clamp(12px,3.5vw,15px);background:#0f2347;color:#fff;border:none;border-radius:13px;font-size:clamp(13px,3.5vw,16px);font-weight:800;box-shadow:0 4px 14px rgba(10,22,40,.3)}
.panel-header{background:#0f2347;padding:clamp(12px,3.5vw,15px) clamp(12px,3.5vw,16px);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;border-bottom:2px solid #1a3a6b}
.btn-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:5px 12px;font-size:clamp(12px,3.2vw,14px);font-weight:700}
.panel-title{font-weight:800;font-size:clamp(15px,4vw,18px);color:#fff}
.panel-sub{font-size:clamp(11px,2.8vw,13px);color:rgba(255,255,255,.75)}
.months-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2.5vw,12px);padding:clamp(10px,3vw,13px)}
.month-card{background:#fff;border-radius:14px;padding:clamp(10px,3vw,13px);cursor:pointer;box-shadow:0 2px 10px rgba(10,22,40,.07);border:2px solid #0f2347;transition:transform .1s;user-select:none;-webkit-user-select:none}
.month-card:active{transform:scale(.97)}
.month-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.month-name{font-weight:800;font-size:clamp(13px,3.5vw,16px);color:#000}
.month-check{width:clamp(18px,5vw,22px);height:clamp(18px,5vw,22px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2.5vw,12px);color:#fff;flex-shrink:0;font-weight:900}
.month-meta{font-size:clamp(10px,2.5vw,12px);color:#000;font-weight:600;margin-bottom:6px}
.month-exp-lbl{font-size:clamp(9px,2.2vw,11px);color:#444;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.month-exp-val{font-size:clamp(11px,2.8vw,13px);font-weight:700;color:#000;margin-bottom:2px}
.month-real{border-top:1.5px solid #e8edf5;padding-top:6px;margin-top:5px;margin-bottom:4px}
.month-real-lbl{font-size:clamp(9px,2.2vw,11px);color:#059669;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.month-real-val{font-size:clamp(12px,3vw,14px);font-weight:800;color:#059669}
.month-real-saved{font-size:clamp(9px,2.2vw,11px);color:#333;font-weight:600;margin-top:1px}
.month-status{display:flex;align-items:center;gap:4px;margin-top:5px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-lbl{font-size:clamp(10px,2.5vw,12px);font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(5,10,25,.65);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:22px 22px 0 0;padding:clamp(16px,4vw,20px) clamp(14px,4vw,17px) clamp(28px,7vw,36px);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border-top:3px solid #0f2347}
.overlay-handle{width:42px;height:4px;background:#c8d0df;border-radius:99px;margin:0 auto 16px}
.overlay-title{font-size:clamp(16px,4.5vw,20px);font-weight:800;color:#000;margin-bottom:16px}
.form-wrap{background:#fff;border-radius:16px;padding:clamp(14px,4vw,20px);box-shadow:0 4px 22px rgba(10,22,40,.13);border:2px solid #0f2347}
.field{margin-bottom:13px}
.field label{font-size:clamp(12px,3.2vw,14px);font-weight:700;display:block;margin-bottom:6px;color:#000}
.field input,.field select{width:100%;padding:clamp(9px,2.5vw,12px) 12px;border-radius:9px;border:1.5px solid #0f2347;font-size:clamp(14px,3.8vw,16px);outline:none;color:#000;background:#f7f9ff;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:#0f2347;background:#fff}
.field-row{display:flex;gap:8px}
.field-row select{flex:1}
.field-row select.yr{width:clamp(70px,18vw,85px);flex:none}
.preview-box{background:#f0f4ff;border-radius:10px;padding:clamp(10px,3vw,13px);margin-bottom:13px;border:1.5px solid #0f2347}
.preview-box-title{font-size:clamp(12px,3.2vw,14px);color:#000;font-weight:800;margin-bottom:3px}
.preview-box-text{font-size:clamp(12px,3.2vw,14px);color:#000;font-weight:600}
.btn-row{display:flex;gap:8px}
.btn-cancel{flex:1;padding:clamp(11px,3vw,13px);border-radius:10px;border:1.5px solid #0f2347;background:#fff;font-weight:700;font-size:clamp(13px,3.5vw,15px);color:#000}
.btn-save{flex:2;padding:clamp(11px,3vw,13px);border-radius:10px;border:none;background:#0f2347;color:#fff;font-weight:800;font-size:clamp(13px,3.5vw,15px)}
.mm-title{font-size:clamp(17px,4.5vw,21px);font-weight:800;margin-bottom:2px;color:#000}
.mm-sub{font-size:clamp(12px,3.2vw,14px);color:#333;font-weight:500;margin-bottom:16px}
.mm-meta-lbl{font-size:clamp(11px,3vw,13px);color:#000;font-weight:700;margin-bottom:2px}
.mm-meta-val{font-size:clamp(22px,6vw,30px);font-weight:900;margin-bottom:14px;color:#0f2347}
.mm-inp-lbl{font-size:clamp(13px,3.5vw,15px);font-weight:700;display:block;margin-bottom:8px;color:#000}
.mm-input-wrap{display:flex;align-items:center;border:2px solid #0f2347;border-radius:11px;padding:clamp(9px,2.5vw,12px) 14px;margin-bottom:10px;background:#f7f9ff}
.mm-input-prefix{color:#000;font-size:clamp(14px,3.8vw,16px);font-weight:700;margin-right:7px}
.mm-input{border:none;outline:none;font-size:clamp(18px,5vw,22px);flex:1;background:transparent;font-weight:700;color:#000;width:100%}
.mm-feedback{border-radius:9px;padding:clamp(9px,2.5vw,12px) 14px;margin-bottom:14px;font-size:clamp(12px,3.2vw,14px);font-weight:700}
.mm-btn-row{display:flex;gap:8px}
.btn-del{flex:1;padding:clamp(10px,2.8vw,12px);border-radius:10px;border:1.5px solid #dc2626;background:#fff;color:#dc2626;font-weight:700;font-size:clamp(12px,3.2vw,14px)}
.btn-mm-cancel{flex:1;padding:clamp(10px,2.8vw,12px);border-radius:10px;border:1.5px solid #0f2347;background:#fff;font-weight:700;font-size:clamp(12px,3.2vw,14px);color:#000}
.btn-mm-save{flex:2;padding:clamp(10px,2.8vw,12px);border-radius:10px;border:none;background:#0f2347;color:#fff;font-weight:800;font-size:clamp(13px,3.5vw,15px)}
.del-confirm-box{background:#fff1f2;border:1.5px solid #dc2626;border-radius:11px;padding:clamp(11px,3vw,14px);margin-bottom:14px}
.del-confirm-text{font-size:clamp(12px,3.2vw,14px);font-weight:700;color:#dc2626;margin-bottom:10px}
.del-confirm-row{display:flex;gap:8px}
.btn-del-sim{flex:1;padding:11px;border-radius:9px;border:none;background:#dc2626;color:#fff;font-weight:800;font-size:clamp(12px,3.2vw,14px)}
.btn-del-nao{flex:1;padding:11px;border-radius:9px;border:1.5px solid #0f2347;background:#fff;font-weight:700;font-size:clamp(12px,3.2vw,14px);color:#000}
.setup-photo{position:relative;height:clamp(155px,42vw,215px);overflow:hidden}
.setup-photo img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block}
.setup-overlay{position:absolute;inset:0;background:linear-gradient(170deg,rgba(8,18,40,.84) 0%,rgba(12,28,65,.70) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.setup-app{font-size:clamp(22px,7vw,32px);font-weight:900;color:#fff;letter-spacing:3px;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.5);margin-bottom:6px}
.setup-sub{font-size:clamp(12px,3.2vw,14px);color:rgba(255,255,255,.85)}
.spacer{height:24px}
#installBtn{play:none;width:100%;padding:clamp(11px,3vw,14px);background:#059669;color:#fff;border:none;border-radius:13px;font-size:clamp(13px,3.5vw,15px);font-weight:800;margin-top:10px;box-shadow:0 4px 14px rgba(5,150,105,.3);}#installBtn{display:none;width:100%;padding:clamp(11px,3vw,14px);background:#059669;color:#fff;border:none;border-radius:13px;font-size:clamp(13px,3.5vw,15px);font-weight:800;margin-top:10px;box-shadow:0 4px 14px rgba(5,150,105,.3);}.sinc-banner{text-align:center;font-size:clamp(11px,2.8vw,13px);color:#059669;margin-top:12px;font-weight:600;padding:6px 10px;background:#ecfdf5;border-radius:8px;border:1px solid #a7f3d0}
@keyframes pu{0%,100%{opacity:.2}50%{opacity:1}}

</style>

var HDRS={"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"};

var MS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

function fmt(v){
  var n=parseFloat(v)||0,neg=n<0,abs=Math.abs(n).toFixed(2);
  var p=abs.split("."),i=p[0],d=p[1];
  return(neg?"-":"")+"R$ "+i.replace(/\B(?=(\d{3})+(?!\d))/g,".")+","+d;
}
function addM(y,m,n){var d=new Date(y,m+n);return[d.getFullYear(),d.getMonth()];}
function mkKey(y,m){return y+"-"+(m+1<10?"0"+(m+1):""+(m+1));}
function mkLbl(y,m){return MS[m]+"/"+(String(y).slice(-2));}

async function dbGet(k){
  try{
    var r=await fetch(SUPA_URL+"/rest/v1/conquista?key=eq."+k+"&select=value",{headers:HDRS});
    var d=await r.json();
    return(Array.isArray(d)&&d.length>0)?JSON.parse(d[0].value):null;
  }catch(e){return null;}
}
async function dbSet(k,val){
  try{
    await fetch(SUPA_URL+"/rest/v1/conquista",{
      method:"POST",
      headers:Object.assign({},HDRS,{"Prefer":"resolution=merge-duplicates"}),
      body:JSON.stringify({key:k,value:JSON.stringify(val),updated_at:new Date().toISOString()})
    });
  }catch(e){console.error("Supabase erro:",e);}
}
async function loadGoal(){return await dbGet("goal");}
async function loadRecs(){return(await dbGet("recs"))||{};}
async function saveGoal(g){await dbSet("goal",g);}
async function saveRecs(r){await dbSet("recs",r);}

var goal=null,recs={},screen="loading",activeMonth=null,mInput="",delConfirm=false,saving=false,pollTimer=null;
var now=new Date();
var form={title:"",total:"",saved:"0",monthly:"",sy:now.getFullYear(),sm:now.getMonth()};

function calcData(){
  if(!goal)return null;
  var sy=parseInt(goal.sd),sm=parseInt(goal.sd.slice(5))-1;
  var rem0=goal.total-goal.saved;
  if(rem0<=0||!goal.monthly){
    return{months:[],totalReal:goal.saved,remReal:0,pct:100,mLeft:0,end:"Meta alcancada!",baseSaved:goal.saved,sumR:0};
  }
  var planned=Math.ceil(rem0/goal.monthly),months=[],rAcc=goal.saved;
  for(var i=0;i<planned;i++){
    var ym=addM(sy,sm,i),y=ym[0],m=ym[1];
    var key=mkKey(y,m),label=mkLbl(y,m);
    var expAcc=Math.min(goal.saved+(i+1)*goal.monthly,goal.total);
    var has=recs[key]!==undefined;
    if(has)rAcc+=recs[key];
    var status=has?(recs[key]>=goal.monthly?"done":"partial"):"pending";
    months.push({key:key,label:label,y:y,m:m,expAcc:expAcc,
      realAcc:has?rAcc:null,has:has,rec:has?recs[key]:null,
      monthly:goal.monthly,status:status});
  }
  var sumR=Object.values(recs).reduce(function(a,b){return a+b;},0);
  var baseSaved=goal.saved,totalReal=goal.saved+sumR;
  var remReal=Math.max(goal.total-totalReal,0);
  var pct=Math.min(totalReal/goal.total*100,100);
  var mLeft=remReal>0?Math.ceil(remReal/goal.monthly):0;
  var n2=new Date(),eym=addM(n2.getFullYear(),n2.getMonth(),mLeft);
  var end=mLeft===0?"Meta alcancada!":MF[eym[1]]+" de "+eym[0];
  return{months:months,totalReal:totalReal,remReal:remReal,pct:pct,
    mLeft:mLeft,end:end,baseSaved:baseSaved,sumR:sumR};
}

function render(){
  var app=document.getElementById("app"),data=calcData();
  if(screen==="loading")app.innerHTML=rLoading();
  else if(screen==="setup")app.innerHTML=rSetup();
  else if(screen==="dash")app.innerHTML=rDash(data);
  else if(screen==="panel")app.innerHTML=rPanel(data);
  if(activeMonth)app.innerHTML+=rMonthModal();
  else if(screen==="editGoal")app.innerHTML+=rGoalModal();
}

function rLoading(){
  return'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;background:#e8edf5">'
    +'<div style="font-size:42px;color:#0f2347;font-weight:900">C</div>'
    +'<div style="font-size:22px;font-weight:800;color:#0f2347;letter-spacing:3px">CONQUISTA</div>'
    +'<div style="font-size:14px;color:#666">Carregando dados...</div>'
    +'<div style="width:48px;height:5px;background:#0f2347;border-radius:99px;animation:pu 1.2s infinite"></div>'
    +'</div>';
}

function rSetup(){
  return'<div class="setup-photo"><img src="'+IMG+'" style="width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block">'
    +'<div class="setup-overlay"><div class="setup-app">Conquista</div>'
    +'<div class="setup-sub">Configure sua primeira meta financeira</div></div></div>'
    +'<div style="padding:0 13px;margin-top:-18px;padding-bottom:24px">'+rGoalForm(true)+'</div>';
}

function rDash(data){
  if(!data)return"";
  var pct=data.pct,mLeft=data.mLeft,end=data.end,totalReal=data.totalReal,remReal=data.remReal,baseSaved=data.baseSaved,sumR=data.sumR;
  var savedSub=sumR>0?"+"+fmt(sumR)+" em registros mensais":"";
  return'<div class="apt-header"><img src="'+IMG+'" style="width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block">'
    +'<div class="apt-overlay"></div>'
    +'<div class="apt-content"><div class="app-badge">Conquista</div>'
    +'<div class="apt-title">'+goal.title+'</div>'
    +'<div class="apt-sub">Sua jornada ate a meta financeira</div></div>'
    +'<button class="btn-edit-apt" onclick="openEdit()">Editar</button></div>'
    +'<div class="content">'
    +'<div class="prog-card">'
    +'<div class="prog-label">Progresso Geral</div>'
    +'<div class="prog-sub">'+fmt(totalReal)+' de '+fmt(goal.total)+'</div>'
    +'<div class="prog-bar-bg"><div class="prog-bar-fill" style="width:'+Math.min(pct,100)+'%"></div></div>'
    +'<div class="prog-pct"><span>Progresso</span><span>'+pct.toFixed(1)+'%</span></div>'
    +'</div>'
    +'<div class="cards-grid">'
    +sc("Meta",fmt(goal.total),"#0f2347","#eef2ff","")
    +sc("Ja Economizado",fmt(baseSaved),"#059669","#ecfdf5",savedSub)
    +sc("Faltam",fmt(remReal),"#92400e","#fffbeb",pct.toFixed(1)+"% concluido")
    +sc("Previsao",end,"#0f2347","#f0f4ff",mLeft>0?mLeft+" meses restantes":"Concluido!",true)
    +'</div>'
    +'<button class="btn-panel" onclick="goPanel()">Ver Painel de Economia Mensal</button>'
    +'<div class="sinc-banner">Sincronizado - visivel nos dois celulares</div>'
    +'<div class="spacer"></div></div>';
}

function sc(label,value,color,bg,sub,small){
  return'<div class="stat-card" style="background:'+bg+'">'
    +'<div class="stat-label">'+label+'</div>'
    +'<div class="stat-value" style="font-size:'+(small?14:20)+'px;color:'+color+'">'+value+'</div>'
    +(sub?'<div class="stat-sub">'+sub+'</div>':"")
    +'</div>';
}

function rPanel(data){
  if(!data)return"";
  var months=data.months;
  var stMap={
    pending:{l:"Nao iniciado",c:"#6b7280"},
    done:{l:"Concluido",c:"#059669"},
    partial:{l:"Parcial",c:"#b45309"}
  };
  var cards=months.map(function(m,idx){
    var s=stMap[m.status];
    var lw=m.status!=="pending"?"4px":"2px",lc=m.status!=="pending"?s.c:"#0f2347";
    var checkBg=m.status==="done"?"#059669":"transparent";
    var checkBorder=m.status==="done"?"none":"2px solid #0f2347";
    var checkTxt=m.status==="done"?"OK":"";
    return'<div class="month-card" onclick="openMonth('+idx+')" style="border-left:'+lw+' solid '+lc+'">'
      +'<div class="month-card-top"><div class="month-name">'+m.label+'</div>'
      +'<div class="month-check" style="background:'+checkBg+';border:'+checkBorder+'">'+checkTxt+'</div></div>'
      +'<div class="month-meta">Meta: '+fmt(m.monthly)+'</div>'
      +'<div><div class="month-exp-lbl">Esperado</div><div class="month-exp-val">'+fmt(m.expAcc)+'</div></div>'
      +(m.has?'<div class="month-real"><div class="month-real-lbl">Real acumulado</div>'
        +'<div class="month-real-val">'+fmt(m.realAcc)+'</div>'
        +'<div class="month-real-saved">Guardou: '+fmt(m.rec)+'</div></div>':"")
      +'<div class="month-status"><div class="status-dot" style="background:'+s.c+'"></div>'
      +'<span class="status-lbl" style="color:'+s.c+'">'+s.l+'</span></div>'
      +'</div>';
  }).join("");
  return'<div class="panel-header"><button class="btn-back" onclick="goBack()">Voltar</button>'
    +'<div><div class="panel-title">Painel de Economia</div>'
    +'<div class="panel-sub">Registre sua economia mes a mes</div></div></div>'
    +(months.length===0?'<div style="text-align:center;padding:60px;color:#333;font-size:20px;font-weight:700">Meta alcancada!</div>'
      :'<div class="months-grid">'+cards+'</div><div class="spacer"></div>');
}

function rMonthModal(){
  var m=activeMonth,v=parseFloat(mInput.replace(",","."));
  var diff=!isNaN(v)?v-m.monthly:null;
  var fb="";
  if(diff!==null){
    var ok=diff>=0;
    fb='<div class="mm-feedback" style="background:'+(ok?"#ecfdf5":"#fef3c7")+';border:1.5px solid '+(ok?"#34d399":"#f59e0b")+';color:'+(ok?"#065f46":"#78350f")+'">'
      +(ok?"Voce adiantou "+fmt(diff):"Ficou "+fmt(Math.abs(diff))+" abaixo da meta")
      +'</div>';
  }
  var dc=delConfirm?'<div class="del-confirm-box"><div class="del-confirm-text">Remover o registro de '+m.label+'?</div>'
    +'<div class="del-confirm-row"><button class="btn-del-sim" onclick="doDelMonth()">Sim, remover</button>'
    +'<button class="btn-del-nao" onclick="cancelDel()">Nao</button></div></div>':"";
  var bt=delConfirm?"":('<div class="mm-btn-row">'
    +(m.has?'<button class="btn-del" onclick="askDel()">Apagar</button>':"")
    +'<button class="btn-mm-cancel" onclick="closeMModal()">Cancelar</button>'
    +'<button class="btn-mm-save" onclick="saveMonth()">'+(saving?"Salvando...":"Salvar")+'</button></div>');
  return'<div class="overlay" onclick="closeOverlay(event)"><div class="overlay-box">'
    +'<div class="overlay-handle"></div>'
    +'<div class="mm-title">'+m.label+'</div>'
    +'<div class="mm-sub">Registre quanto voce guardou neste mes</div>'
    +'<div><div class="mm-meta-lbl">Meta do Mes</div><div class="mm-meta-val">'+fmt(m.monthly)+'</div></div>'
    +'<label class="mm-inp-lbl">Quanto voce guardou?</label>'
    +'<div class="mm-input-wrap"><span class="mm-input-prefix">R$</span>'
    +'<input id="mInput" class="mm-input" type="number" inputmode="decimal" placeholder="0,00" value="'+mInput+'" oninput="onMInput(this.value)"></div>'
    +'<div id="mmfb">'+fb+'</div>'+dc+bt
    +'</div></div>';
}

function rGoalModal(){
  return'<div class="overlay" onclick="closeGoalModal(event)"><div class="overlay-box">'
    +'<div class="overlay-handle"></div>'
    +'<div class="overlay-title">Editar Meta</div>'
    +rGoalForm(false)
    +'</div></div>';
}

function calcPrev(){
  var tg=parseFloat(form.total),as=parseFloat(form.saved)||0,mt=parseFloat(form.monthly);
  if(!tg||!mt||isNaN(tg)||isNaN(mt)||mt<=0)return null;
  var rem=Math.max(tg-as,0);
  return{rem:rem,months:Math.ceil(rem/mt),prog:Math.min(as/tg*100,100)};
}

function rGoalForm(isNew){
  var yrs=[],y=new Date().getFullYear()-1;
  for(var i=0;i<6;i++)yrs.push(y+i);
  var p=calcPrev();
  var mO=MF.map(function(n,i){return'<option value="'+i+'"'+(form.sm===i?" selected":"")+'>'+n+'</option>';}).join("");
  var yO=yrs.map(function(yr){return'<option value="'+yr+'"'+(form.sy===yr?" selected":"")+'>'+yr+'</option>';}).join("");
  var prevHtml=p?'<div class="preview-box"><div class="preview-box-title">Previsao</div>'
    +'<div class="preview-box-text">Faltam '+fmt(p.rem)+' - '+p.months+' meses ('+p.prog.toFixed(0)+'% concluido)</div></div>':"";
  return'<div class="'+(isNew?"form-wrap":"")+'">'
    +'<div class="field"><label>Nome da Meta</label>'
    +'<input type="text" value="'+form.title+'" placeholder="Ex: Quitar Apartamento" oninput="setForm(\'title\',this.value)"></div>'
    +'<div class="field"><label>Valor Total da Meta (R$)</label>'
    +'<input type="number" inputmode="decimal" value="'+form.total+'" placeholder="138000" oninput="setForm(\'total\',this.value)"></div>'
    +'<div class="field"><label>Ja Economizado (R$)</label>'
    +'<input type="number" inputmode="decimal" value="'+form.saved+'" placeholder="0" oninput="setForm(\'saved\',this.value)"></div>'
    +'<div class="field"><label>Economia Mensal (R$)</label>'
    +'<input type="number" inputmode="decimal" value="'+form.monthly+'" placeholder="700" oninput="setForm(\'monthly\',this.value)"></div>'
    +'<div class="field"><label>Mes de inicio</label>'
    +'<div class="field-row"><select onchange="setForm(\'sm\',parseInt(this.value))">'+mO+'</select>'
    +'<select class="yr" onchange="setForm(\'sy\',parseInt(this.value))">'+yO+'</select></div></div>'
    +'<div id="prev-wrap">'+prevHtml+'</div>'
    +'<div class="btn-row">'
    +(isNew?"":'<button class="btn-cancel" onclick="closeGoalModal2()">Cancelar</button>')
    +'<button class="btn-save" onclick="doSaveGoal()">'+(isNew?"Criar Meta":"Salvar")+'</button>'
    +'</div></div>';
}

function goPanel(){screen="panel";render();restartPoll();}
function goBack(){screen="dash";render();restartPoll();}
function openEdit(){
  stopPoll();
  if(goal){
    var sy=parseInt(goal.sd),sm=parseInt(goal.sd.slice(5))-1;
    form={title:goal.title,total:String(goal.total),saved:String(goal.saved),monthly:String(goal.monthly),sy:sy,sm:sm};
  }
  screen="editGoal";render();
}
function closeGoalModal(e){if(e.target===e.currentTarget){screen="dash";render();restartPoll();}}
function closeGoalModal2(){screen="dash";render();restartPoll();}
function closeMModal(){activeMonth=null;mInput="";delConfirm=false;render();restartPoll();}
function closeOverlay(e){if(e.target===e.currentTarget){activeMonth=null;mInput="";delConfirm=false;render();restartPoll();}}
function setForm(k,v){
  form[k]=v;
  var pw=document.getElementById("prev-wrap");
  if(pw){var p=calcPrev();pw.innerHTML=p?'<div class="preview-box"><div class="preview-box-title">Previsao</div><div class="preview-box-text">Faltam '+fmt(p.rem)+' - '+p.months+' meses ('+p.prog.toFixed(0)+'% concluido)</div></div>':"";}
}
async function doSaveGoal(){
  var g={title:form.title.trim()||"Minha Meta",total:parseFloat(form.total)||0,
    saved:parseFloat(form.saved)||0,monthly:parseFloat(form.monthly)||0,sd:mkKey(form.sy,form.sm)};
  if(g.total<=0||g.monthly<=0){alert("Preencha o Valor Total e a Economia Mensal.");return;}
  saving=true;goal=g;await saveGoal(goal);saving=false;screen="dash";render();restartPoll();
}
function openMonth(idx){
  stopPoll();
  var data=calcData();activeMonth=data.months[idx];
  mInput=activeMonth.has?String(activeMonth.rec):"";delConfirm=false;render();
  setTimeout(function(){var inp=document.getElementById("mInput");if(inp){inp.focus();}},60);
}
function onMInput(v){
  mInput=v;
  var iv=parseFloat(v.replace(",","."));
  var diff=!isNaN(iv)?iv-activeMonth.monthly:null;
  var fb=document.getElementById("mmfb");if(!fb)return;
  if(diff!==null){
    var ok=diff>=0;
    fb.innerHTML='<div class="mm-feedback" style="background:'+(ok?"#ecfdf5":"#fef3c7")+';border:1.5px solid '+(ok?"#34d399":"#f59e0b")+';color:'+(ok?"#065f46":"#78350f")+'">'
      +(ok?"Voce adiantou "+fmt(diff):"Ficou "+fmt(Math.abs(diff))+" abaixo da meta")+'</div>';
  }else{fb.innerHTML="";}
}
async function saveMonth(){
  var v=parseFloat(mInput.replace(",","."));
  if(isNaN(v)||v<0){alert("Informe um valor valido.");return;}
  saving=true;render();
  recs[activeMonth.key]=v;await saveRecs(recs);
  saving=false;activeMonth=null;mInput="";delConfirm=false;render();restartPoll();
}
function askDel(){delConfirm=true;render();}
function cancelDel(){delConfirm=false;render();}
async function doDelMonth(){
  delete recs[activeMonth.key];await saveRecs(recs);
  activeMonth=null;mInput="";delConfirm=false;render();restartPoll();
}
async function poll(){
  if(screen!=="dash"&&screen!=="panel")return;
  try{
    var ng=await loadGoal(),nr=await loadRecs();
    if(JSON.stringify(ng)!==JSON.stringify(goal)||JSON.stringify(nr)!==JSON.stringify(recs)){
      goal=ng;recs=nr;render();
    }
  }catch(e){}
}
function restartPoll(){stopPoll();pollTimer=setInterval(poll,5000);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
async function init(){
  screen="loading";render();
  try{
    goal=await loadGoal();recs=await loadRecs();
  }catch(e){goal=null;recs={};}
  screen=goal?"dash":"setup";render();restartPoll();
}
